name: Close Stale Issues

on:
  workflow_dispatch: # Manual trigger only

permissions:
  issues: write

jobs:
  close-stale-issues:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        id: stale
        with:
          # --- Timing ---
          days-before-stale: -1 # Disable the "stale" warning step
          days-before-close: 7 # Close issues that have been open > 7 days

          # --- Exempt labels ---
          exempt-issue-labels: "keep,priority:critical,priority:high,severity:critical,severity:high"

          # --- Close message ---
          close-issue-message: |
            **This issue has been automatically closed** as part of our backlog
            grooming process. Issues open for more than 7 days without the `keep`
            label are closed to help the team focus on the highest-priority work.

            **Why was this closed?**
            - The issue did not have a `keep` label, indicating it was not
              explicitly marked for preservation during triage.
            - It may be a stale request, a duplicate, or lower priority relative
              to the current backlog.

            **How to reopen:**
            - If this issue is still relevant, simply reopen it and add the `keep`
              label to prevent future auto-closure.
            - You can also comment on this issue explaining why it should remain
              open and a maintainer will review it.

          # --- Labels applied on close ---
          close-issue-label: "stale"

          # --- Scope ---
          only-issues: true # Don't touch pull requests

          # --- Rate limiting ---
          operations-per-run: 100

          # --- Filtering ---
          exempt-all-milestones: true
          exempt-all-assignees: false

      - name: Notify Slack about stale closures
        if: steps.stale.outputs.closed-issues-prs != ''
        uses: actions/github-script@v7
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          script: |
            const raw = '${{ steps.stale.outputs.closed-issues-prs }}';
            console.log('Raw closed-issues-prs output:', JSON.stringify(raw));

            // Extract numeric issue numbers, handling formats like "42", "#42", or URLs
            const closedIssueNumbers = raw
              .split(',')
              .map(entry => {
                const match = entry.match(/(\d+)/);
                return match ? parseInt(match[1], 10) : NaN;
              })
              .filter(n => !isNaN(n) && n > 0);

            if (closedIssueNumbers.length === 0) {
              console.log('No valid issue numbers found in output, skipping notifications.');
              return;
            }

            console.log('Notifying Slack for closed issues:', closedIssueNumbers);
            const { owner, repo } = context.repo;
            const repoUrl = `https://github.com/${owner}/${repo}`;

            for (const issueNumber of closedIssueNumbers) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner,
                  repo,
                  issue_number: issueNumber,
                });

                const author = issue.user.login;
                const payload = {
                  channel: '#issue-triage-updates',
                  text: `:wastebasket: Issue <${repoUrl}/issues/${issueNumber}|#${issueNumber}> was auto-closed as *stale*.\n` +
                    `*Title:* ${issue.title}\n` +
                    `*Author:* @${author}\n` +
                    `The issue was open for more than 7 days without a \`keep\` label. ` +
                    `To reopen, add the \`keep\` label and reopen the issue.`,
                };

                await fetch(process.env.SLACK_WEBHOOK_URL, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(payload),
                });
              } catch (err) {
                console.error(`Failed to notify for issue #${issueNumber}:`, err.message);
              }
            }

      - name: Close duplicate issues and notify Slack
        uses: actions/github-script@v7
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const repoUrl = `https://github.com/${owner}/${repo}`;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            // Filter to only real issues (not PRs)
            const realIssues = issues.filter(i => !i.pull_request);

            // Group issues by normalized title to find near-duplicates
            const groups = {};
            for (const issue of realIssues) {
              const key = issue.title.toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim();
              if (!groups[key]) groups[key] = [];
              groups[key].push(issue);
            }

            for (const [key, dupes] of Object.entries(groups)) {
              if (dupes.length < 2) continue;

              // Sort by creation date ascending — keep the oldest, close the rest
              dupes.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
              const original = dupes[0];

              for (let i = 1; i < dupes.length; i++) {
                const dupe = dupes[i];

                // Skip issues with the 'keep' label
                if (dupe.labels.some(l => l.name === 'keep')) continue;

                console.log(`Closing #${dupe.number} as duplicate of #${original.number}`);

                // Add 'duplicate' label
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: dupe.number,
                  labels: ['duplicate'],
                });

                // Post a comment explaining the closure
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: dupe.number,
                  body: `**This issue has been automatically closed as a duplicate** of #${original.number}.\n\n` +
                    `Both issues describe the same problem. Work will be tracked in #${original.number}.\n\n` +
                    `**How to reopen:**\n` +
                    `- If this is **not** a duplicate, reopen it with a comment explaining the difference and add the \`keep\` label.\n` +
                    `- If you have additional context, please add it to #${original.number}.`,
                });

                // Close the issue
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: dupe.number,
                  state: 'closed',
                  state_reason: 'not_planned',
                });

                // Send Slack notification
                const author = dupe.user.login;
                const payload = {
                  channel: '#issue-triage-updates',
                  text: `:wastebasket: Issue <${repoUrl}/issues/${dupe.number}|#${dupe.number}> was auto-closed as a *duplicate* of <${repoUrl}/issues/${original.number}|#${original.number}>.\n` +
                    `*Title:* ${dupe.title}\n` +
                    `*Author:* @${author}\n` +
                    `Both issues describe the same problem. Work will be tracked in #${original.number}.`,
                };

                await fetch(process.env.SLACK_WEBHOOK_URL, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(payload),
                });
              }
            }
