name: Close Stale Issues

on:
  schedule:
    - cron: '30 9 * * 1' # Every Monday at 9:30 AM UTC (after triage completes)
  workflow_dispatch: # Manual trigger

permissions:
  issues: write

jobs:
  close-stale-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Close stale issues and notify Slack
        uses: actions/github-script@v7
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const repoUrl = `https://github.com/${owner}/${repo}`;
            const STALE_DAYS = 7;
            const EXEMPT_LABELS = ['keep', 'priority:critical', 'priority:high', 'severity:critical', 'severity:high'];

            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - STALE_DAYS);

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              sort: 'created',
              direction: 'asc',
              per_page: 100,
            });

            // Filter to real issues (not PRs), older than cutoff, without exempt labels
            const staleIssues = issues.filter(issue => {
              if (issue.pull_request) return false;
              if (new Date(issue.created_at) > cutoff) return false;
              const labels = issue.labels.map(l => l.name);
              return !EXEMPT_LABELS.some(exempt => labels.includes(exempt));
            });

            console.log(`Found ${staleIssues.length} stale issues (older than ${STALE_DAYS} days without exempt labels)`);

            let closedCount = 0;
            for (const issue of staleIssues) {
              try {
                console.log(`Closing #${issue.number}: "${issue.title}" (created ${issue.created_at})`);

                // Add 'stale' label
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: issue.number,
                  labels: ['stale'],
                });

                // Post a comment explaining the closure
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issue.number,
                  body: `**This issue has been automatically closed** as part of our backlog\n` +
                    `grooming process. Issues open for more than ${STALE_DAYS} days without the \`keep\`\n` +
                    `label are closed to help the team focus on the highest-priority work.\n\n` +
                    `**Why was this closed?**\n` +
                    `- The issue did not have a \`keep\` label, indicating it was not\n` +
                    `  explicitly marked for preservation during triage.\n` +
                    `- It may be a stale request, a duplicate, or lower priority relative\n` +
                    `  to the current backlog.\n\n` +
                    `**How to reopen:**\n` +
                    `- If this issue is still relevant, simply reopen it and add the \`keep\`\n` +
                    `  label to prevent future auto-closure.\n` +
                    `- You can also comment on this issue explaining why it should remain\n` +
                    `  open and a maintainer will review it.`,
                });

                // Close the issue
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: issue.number,
                  state: 'closed',
                  state_reason: 'not_planned',
                });

                closedCount++;

                // Send Slack notification
                if (process.env.SLACK_WEBHOOK_URL) {
                  const author = issue.user.login;
                  const payload = {
                    channel: '#issue-triage-updates',
                    text: `:wastebasket: Issue <${repoUrl}/issues/${issue.number}|#${issue.number}> was auto-closed as *stale*.\n` +
                      `*Title:* ${issue.title}\n` +
                      `*Author:* @${author}\n` +
                      `The issue was open for more than ${STALE_DAYS} days without a \`keep\` label. ` +
                      `To reopen, add the \`keep\` label and reopen the issue.`,
                  };

                  await fetch(process.env.SLACK_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                  });
                }
              } catch (err) {
                console.error(`Failed to close issue #${issue.number}:`, err.message);
              }
            }

            console.log(`Closed ${closedCount} stale issues`);

      - name: Close duplicate issues and notify Slack
        uses: actions/github-script@v7
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const repoUrl = `https://github.com/${owner}/${repo}`;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            // Filter to only real issues (not PRs)
            const realIssues = issues.filter(i => !i.pull_request);

            // Group issues by normalized title to find near-duplicates
            const groups = {};
            for (const issue of realIssues) {
              const key = issue.title.toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim();
              if (!groups[key]) groups[key] = [];
              groups[key].push(issue);
            }

            let closedCount = 0;
            for (const [key, dupes] of Object.entries(groups)) {
              if (dupes.length < 2) continue;

              // Sort by creation date ascending — keep the oldest, close the rest
              dupes.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
              const original = dupes[0];

              for (let i = 1; i < dupes.length; i++) {
                const dupe = dupes[i];

                // Skip issues with the 'keep' label
                if (dupe.labels.some(l => l.name === 'keep')) continue;

                try {
                  console.log(`Closing #${dupe.number} as duplicate of #${original.number}`);

                  // Add 'duplicate' label
                  await github.rest.issues.addLabels({
                    owner,
                    repo,
                    issue_number: dupe.number,
                    labels: ['duplicate'],
                  });

                  // Post a comment explaining the closure
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: dupe.number,
                    body: `**This issue has been automatically closed as a duplicate** of #${original.number}.\n\n` +
                      `Both issues describe the same problem. Work will be tracked in #${original.number}.\n\n` +
                      `**How to reopen:**\n` +
                      `- If this is **not** a duplicate, reopen it with a comment explaining the difference and add the \`keep\` label.\n` +
                      `- If you have additional context, please add it to #${original.number}.`,
                  });

                  // Close the issue
                  await github.rest.issues.update({
                    owner,
                    repo,
                    issue_number: dupe.number,
                    state: 'closed',
                    state_reason: 'not_planned',
                  });

                  closedCount++;

                  // Send Slack notification to #issue-triage-updates
                  if (process.env.SLACK_WEBHOOK_URL) {
                    const author = dupe.user.login;
                    const payload = {
                      channel: '#issue-triage-updates',
                      text: `:wastebasket: Issue <${repoUrl}/issues/${dupe.number}|#${dupe.number}> was auto-closed as a *duplicate* of <${repoUrl}/issues/${original.number}|#${original.number}>.\n` +
                        `*Title:* ${dupe.title}\n` +
                        `*Author:* @${author}\n` +
                        `Both issues describe the same problem. Work will be tracked in #${original.number}.`,
                    };

                    await fetch(process.env.SLACK_WEBHOOK_URL, {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify(payload),
                    });
                  }
                } catch (err) {
                  console.error(`Failed to close duplicate #${dupe.number}:`, err.message);
                }
              }
            }

            console.log(`Closed ${closedCount} duplicate issues`);
