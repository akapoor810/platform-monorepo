name: Triage New Issues

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9:00 AM UTC
  workflow_dispatch:
    inputs:
      max_issues:
        description: 'Maximum number of issues to triage (0 = all untriaged issues)'
        required: false
        default: '0'
        type: string

permissions:
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install PyGithub requests

      - name: Run triage agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
        run: |
          python libs/agents/triage_agent.py --max-issues ${{ github.event.inputs.max_issues || '0' }}
